name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-validation:
    name: PR Build & Test Validation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Cache Bazel artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/bazel
          ~/.cache/bazelisk
        key: ${{ runner.os }}-bazel-${{ hashFiles('WORKSPACE', 'MODULE.bazel', 'src/BUILD.bazel', '.bazelversion') }}
        restore-keys: |
          ${{ runner.os }}-bazel-

    - name: Install Bazelisk
      run: |
        curl -Lo bazelisk https://github.com/bazelbuild/bazelisk/releases/download/v1.19.0/bazelisk-linux-amd64
        chmod +x bazelisk
        sudo mv bazelisk /usr/local/bin/bazel
        bazel --version

    - name: Build entire repository
      run: |
        echo "🔨 Building all targets..."
        bazel build //src:all
        echo "✅ Build successful"

    - name: Run tests
      run: |
        echo "🧪 Running tests..."
        bazel test //src:base_test --test_output=errors --test_summary=detailed
        echo "✅ Tests completed"

    - name: Build verification summary
      if: always()
      run: |
        echo "## Build & Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ ${{ job.status }} == 'success' ]; then
          echo "✅ All checks passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Some checks failed" >> $GITHUB_STEP_SUMMARY
        fi
